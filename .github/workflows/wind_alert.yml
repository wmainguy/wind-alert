name: Wind Alert

on:
  schedule:
    # Runs every 3 hours (UTC). Adjust the cron if you want more/less frequent checks.
    # Cron format: minute hour day month weekday
    # Examples:
    #   '0 * * * *'    → every hour
    #   '0 */3 * * *'  → every 3 hours  ← current setting
    #   '0 */6 * * *'  → every 6 hours
    - cron: '0 */3 * * *'

  # Lets you trigger a manual check from the GitHub Actions tab at any time
  workflow_dispatch:

jobs:
  check-wind:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run wind check
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}   # optional — defaults to GMAIL_USER
        run: python check_wind.py
